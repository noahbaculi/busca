name: CICD

on: push

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: cargo fmt --check

  build-clippy:
    name: Build and Clippy
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3
      - run: cargo build --all-targets
      - run: cargo clippy --all-targets -- -D warnings

  msrv:
    name: MSRV 1.85
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: rustup toolchain install 1.85 --profile minimal
      # Build the library and binary on the declared MSRV. The criterion benches
      # need a newer compiler, so this gate covers what consumers build, not the
      # dev-only bench target.
      - run: cargo +1.85 build

  test:
    name: Test
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3
      - run: cargo test
  
  python-test:
    name: Python Test
    # needs: [build-clippy, test]
    strategy:
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3
      - name: Run Python tests
        run: |
          python -m venv ./python_venv
          source python_venv/bin/activate
          pip install -r python_requirements.txt
          maturin develop --release
          python python/test.py
          python -m unittest discover

  benchmark:
    name: Benchmark
    strategy:
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3
      - name: Download Django source fixture
        run: git clone --depth 1 --branch 5.2.15 https://github.com/django/django.git sample-comprehensive
      - run: cargo bench
